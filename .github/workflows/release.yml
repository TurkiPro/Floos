name: Release

# Ship on a version tag only (v1.2.3), never on an ordinary push — so you decide
# exactly when a build reaches the stores.
#
#   git tag v1.0.1 && git push origin v1.0.1
#
# Every store-upload step is gated on its secrets being present, so this whole
# workflow already runs (and produces installable artifacts) before you have
# Apple/Google developer accounts. Add the secrets later and the uploads light
# up with no workflow changes. See RELEASE.md for the secret list.
#
# Note on the gating: the `secrets` context is NOT available in a step's `if:`,
# so each job lifts "do I have these secrets?" into a job-level `env` boolean
# (where secrets ARE available) and the steps branch on that.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  android:
    name: Android → Play internal testing
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PLAY: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # The tag is the version name (v1.0.1 -> 1.0.1); the run number is the
      # build number, which must strictly increase for every store upload.
      #
      # On a manual re-run there is no tag, so fall back to pubspec's version.
      # That matters: the stores let you upload a NEW BUILD of the SAME version
      # (rejected listing, metadata fix, a build-only change like dropping iPad
      # support), and without this the build would be named after the branch.
      # It also means we don't have to keep moving a published tag around.
      - name: Derive version
        id: version
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            NAME="${GITHUB_REF_NAME#v}"
          else
            NAME=$(sed -n 's/^version: *\([^+]*\).*/\1/p' pubspec.yaml)
          fi
          echo "Version $NAME (build $GITHUB_RUN_NUMBER)"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      # Recreate the keystore + key.properties that .gitignore keeps out of git.
      # Without them, build.gradle.kts falls back to the debug key and the AAB is
      # still produced — just not uploadable to Play.
      - name: Restore signing keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - uses: actions/upload-artifact@v4
        with:
          name: floos-${{ steps.version.outputs.name }}-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Play internal testing
        if: env.HAS_PLAY == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.turkisecurity.floos
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  ios:
    name: iOS → TestFlight
    runs-on: macos-latest
    env:
      HAS_APPLE: ${{ secrets.APPSTORE_KEY_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Derive version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      # Without an Apple account we can still prove the iOS build compiles.
      - name: Build (unsigned)
        if: env.HAS_APPLE != 'true'
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Import signing certificate
        if: env.HAS_APPLE == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Download provisioning profile
        if: env.HAS_APPLE == 'true'
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.turkisecurity.floos
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      # The Xcode project ships with CODE_SIGN_STYLE=Automatic and a hardcoded
      # CODE_SIGN_IDENTITY of "iPhone Developer". With automatic signing, Flutter
      # tries to DISCOVER an identity itself — and it looks specifically for a
      # *development* one. We install an Apple Distribution certificate (the only
      # kind that can reach the App Store), so that search finds nothing and the
      # build dies with the thoroughly misleading "No valid code signing
      # certificates were found".
      #
      # Switching the release build to manual signing makes Flutter skip the
      # search and just use the profile we downloaded above. The settings go into
      # Release.xcconfig, which the Runner target already reads as its base
      # config, and which beats the project-level "iPhone Developer" in Xcode's
      # precedence order (target xcconfig > project build settings).
      #
      # The profile NAME is read out of the downloaded profile rather than
      # hardcoded, so this keeps working no matter what it was called in the
      # portal.
      - name: Configure manual signing
        if: env.HAS_APPLE == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PROFILE=$(ls "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision | head -1)
          if [ -z "$PROFILE" ]; then
            echo "::error::No provisioning profile was downloaded. Create an App Store profile for com.turkisecurity.floos in the developer portal."
            exit 1
          fi
          PLIST=$(security cms -D -i "$PROFILE")
          NAME=$(echo "$PLIST" | plutil -extract Name raw -)
          echo "Signing with profile: $NAME"
          echo "PROFILE_NAME=$NAME" >> "$GITHUB_ENV"

          cat >> ios/Flutter/Release.xcconfig <<EOF

          CODE_SIGN_STYLE=Manual
          DEVELOPMENT_TEAM=$TEAM_ID
          CODE_SIGN_IDENTITY=Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER=$NAME
          EOF

      - name: Build signed IPA
        if: env.HAS_APPLE == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.turkisecurity.floos</key><string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF
          flutter build ipa --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --export-options-plist=ios/ExportOptions.plist

      - uses: actions/upload-artifact@v4
        if: env.HAS_APPLE == 'true'
        with:
          name: floos-${{ steps.version.outputs.name }}-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: env.HAS_APPLE == 'true'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/floos.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  # Only on a real tag: a manual re-run has no tag for the release to hang off,
  # and the store uploads above are the part that actually matters there.
  github-release:
    name: Attach artifacts to the GitHub release
    needs: [android, ios]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
