name: Screenshots

# Captures the App Store / Play Store screenshots on real emulated devices, at
# the exact native resolutions the stores demand. Run it by hand from the
# Actions tab, then download the artifacts and upload them to the consoles.
#
# This exists because you can't produce these on Windows: iOS screenshots need a
# Mac, and Apple rejects anything that isn't precisely the expected pixel size,
# so a resized desktop window is useless. GitHub's macOS runners have Xcode and
# the simulators; the Linux runners can boot an Android emulator.
#
# It is also the ONLY place the native plugins (flutter_local_notifications,
# local_auth, app_badge_plus) ever run on a real device image — everywhere else
# they no-op. A crash on init fails this run instead of reaching users.
on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  android:
    name: Android screenshots (Play)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # KVM is what makes the emulator usably fast on the Linux runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run app on emulator and capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6_pro
          disable-animations: true
          # MUST stay on one line, with the paths spelled out. This string is
          # handed to `sh -c`, which does not preserve backslash
          # line-continuations from the YAML block — a multi-line version ends up
          # running `flutter drive \` and treating the stray backslash as the
          # target filename, which is exactly how this failed before.
          script: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/screenshot_test.dart -d emulator-5554

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots-android
          path: screenshots/*.png
          if-no-files-found: error

  ios:
    name: iOS screenshots (App Store)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # Don't hard-code a simulator name: which iPhones exist depends on the
      # Xcode version baked into the runner image, and that moves. Walk a
      # preference list (largest first — Apple's primary screenshot slot is the
      # biggest iPhone) and take the first one actually installed.
      #
      # `set +e` matters: this step runs under `bash -e`, so a `grep` that
      # matches nothing inside a command substitution aborts the whole step
      # before any diagnostic can print. That is exactly how the previous
      # version failed silently in 14 seconds.
      - name: Boot simulator
        run: |
          set +e
          echo "--- simulators available on this runner ---"
          xcrun simctl list devices available
          echo "-------------------------------------------"

          UDID=""
          NAME=""
          for CANDIDATE in \
            "iPhone 16 Pro Max" "iPhone 16 Plus" \
            "iPhone 15 Pro Max" "iPhone 15 Plus" \
            "iPhone 14 Pro Max" "iPhone 14 Plus" \
            "iPhone 16 Pro" "iPhone 16" "iPhone 15"
          do
            UDID=$(xcrun simctl list devices available \
                    | grep -m1 "$CANDIDATE (" \
                    | grep -oE '[0-9A-F]{8}-[0-9A-F-]{27}')
            if [ -n "$UDID" ]; then NAME="$CANDIDATE"; break; fi
          done

          if [ -z "$UDID" ]; then
            echo "::error::No suitable iPhone simulator on this runner (see list above)"
            exit 1
          fi
          set -e

          echo "Using $NAME ($UDID)"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          echo "SIM_NAME=$NAME" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Run app on simulator and capture
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/screenshot_test.dart \
            -d "$SIM_UDID"

      # Apple validates screenshots on exact pixel dimensions, so print what we
      # actually produced — that tells you which store slot these fill.
      - name: Report captured sizes
        run: |
          echo "Device: $SIM_NAME"
          cd screenshots
          for f in *.png; do
            W=$(sips -g pixelWidth "$f" | awk '/pixelWidth/ {print $2}')
            H=$(sips -g pixelHeight "$f" | awk '/pixelHeight/ {print $2}')
            echo "$f -> ${W}x${H}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots-ios
          path: screenshots/*.png
          if-no-files-found: error
