name: Screenshots

# Captures the App Store / Play Store screenshots on real emulated devices, at
# the exact native resolutions the stores demand. Run it by hand from the
# Actions tab, then download the artifacts and upload them to the consoles.
#
# This exists because you can't produce these on Windows: iOS screenshots need a
# Mac, and Apple rejects anything that isn't precisely the expected pixel size,
# so a resized desktop window is useless. GitHub's macOS runners have Xcode and
# the simulators; the Linux runners can boot an Android emulator.
#
# It is also the ONLY place the native plugins (flutter_local_notifications,
# local_auth, app_badge_plus) ever run on a real device image — everywhere else
# they no-op. A crash on init fails this run instead of reaching users.
on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  android:
    name: Android screenshots (Play)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Ubuntu runner ships ~14 GB free, and between the Flutter SDK, the
      # Gradle caches and the debug APK there was nothing left for the emulator:
      # "An error occurred while preparing SDK package ... No space left on
      # device". Reclaim the preinstalled toolchains we never touch.
      #
      # android: false — deleting the Android SDK would take the emulator tooling
      # with it. swap-storage: false — the emulator wants every byte of memory
      # headroom it can get, and reclaiming ~4 GB of swap to buy disk we don't
      # need is a bad trade.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: false
          swap-storage: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # KVM is what makes the emulator usably fast on the Linux runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Compile the app BEFORE the emulator exists. Previously Gradle was
      # compiling while QEMU was already running, and the two fought over the
      # runner's few vCPUs until the emulator starved and died with
      # "detected a hanging thread 'QEMU2 main loop'". Warming the Gradle daemon
      # and the dependency cache here means the run inside the emulator step is
      # nearly incremental.
      - name: Pre-build the app (keeps Gradle off the emulator's CPU)
        run: flutter build apk --debug

      # If the emulator misbehaves again, these two numbers are the first thing
      # to look at — the last three failures were all resources, not code.
      - name: Report free disk and memory
        run: |
          df -h /
          free -h

      - name: Run app on emulator and capture
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          # `default`, not `google_apis`: nothing we ship needs Play Services
          # (flutter_local_notifications, local_auth and app_badge_plus are all
          # plain framework/launcher APIs). The plain image is a couple of GB
          # smaller and boots far less on startup, which is exactly what the
          # last run ran out of — it reached "performing a full startup" and then
          # sat in `adb: device offline` until the step gave up.
          target: default
          arch: x86_64
          profile: pixel_6_pro
          disable-animations: true
          emulator-boot-timeout: 900
          # No GPU and no audio device exist on a CI runner; without
          # swiftshader_indirect the emulator tries to negotiate host graphics
          # and wedges. -no-snapshot avoids slow snapshot save/load too.
          emulator-options: >-
            -no-window -no-audio -no-boot-anim -no-snapshot
            -gpu swiftshader_indirect -camera-back none -camera-front none
          # MUST stay on one line, with the paths spelled out. This string is
          # handed to `sh -c`, which does not preserve backslash
          # line-continuations from the YAML block — a multi-line version ends up
          # running `flutter drive \` and treating the stray backslash as the
          # target filename, which is exactly how this failed before.
          script: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/screenshot_test.dart -d emulator-5554

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots-android
          path: screenshots/*.png
          if-no-files-found: error

  ios:
    name: iOS screenshots (App Store)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # Which iPhones exist depends on the Xcode baked into the runner image, and
      # that image moves: `macos-latest` rolled to macOS 26, the iPhone 16 family
      # disappeared, and the previous hard-coded preference list matched nothing.
      # pick_simulator.py asks the runner what it actually has instead.
      - name: Boot simulator
        run: |
          echo "--- iOS simulators available on this runner ---"
          xcrun simctl list devices available
          echo "-----------------------------------------------"

          SELECTED=$(xcrun simctl list devices available -j \
                      | python3 .github/scripts/pick_simulator.py) || {
            echo "::error::No iPhone simulator on this runner (see list above)"
            exit 1
          }

          UDID="${SELECTED%%$'\t'*}"
          NAME="${SELECTED#*$'\t'}"
          echo "Using $NAME ($UDID)"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          echo "SIM_NAME=$NAME" >> "$GITHUB_ENV"

          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Run app on simulator and capture
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/screenshot_test.dart \
            -d "$SIM_UDID"

      # Apple validates screenshots on exact pixel dimensions, so print what we
      # actually produced — that tells you which store slot these fill.
      - name: Report captured sizes
        run: |
          echo "Device: $SIM_NAME"
          cd screenshots
          for f in *.png; do
            W=$(sips -g pixelWidth "$f" | awk '/pixelWidth/ {print $2}')
            H=$(sips -g pixelHeight "$f" | awk '/pixelHeight/ {print $2}')
            echo "$f -> ${W}x${H}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots-ios
          path: screenshots/*.png
          if-no-files-found: error
