name: CI

# Every push and PR: prove the code analyses, passes its tests, and still
# assembles a real Android app. The Android build matters here because the
# native config (desugaring, R8, the biometric FragmentActivity, the
# notification receivers) can only break at assemble time, not at `flutter test`.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # database.g.dart is gitignored, so it has to be regenerated before
      # anything will compile.
      - name: Generate drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      # No signing secrets needed: without android/key.properties the Gradle
      # config falls back to the debug key, which is enough to prove the release
      # pipeline (R8 + desugaring + manifest merge) assembles.
      - name: Build release AAB (debug-signed)
        run: flutter build appbundle --release
