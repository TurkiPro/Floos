name: floos
description: "تطبيق بسيط لتتبع المصاريف — a minimal expense tracker."
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Reactive local database (source of truth, fully offline).
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Number/date formatting.
  intl: 0.20.2

  # Lightweight DI for handing the database to the widget tree.
  provider: ^6.1.2


  # Persists UI preferences (theme mode + accent color) across launches.
  shared_preferences: ^2.2.2

  # Local reminder/alert notifications (mobile; no-ops elsewhere).
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Biometric / device-passcode app lock (Face ID, fingerprint, password).
  local_auth: ^2.3.0

  # Confirmation chime when a transaction is saved.
  # Hijri calendar conversion for the ميلادي/هجري toggle.
  hijri: ^3.0.0
  app_badge_plus: ^1.3.2
  flutter_timezone: ^5.1.0

  # Share sheet for handing the backup file to the user's own storage
  # (Files/iCloud/Drive). The file never touches a server we run.
  share_plus: ^10.0.0
  # System file-open dialog for picking a backup file to restore.
  file_selector: ^1.0.3
  # Plays the short income/expense confirmation chimes bundled in assets.
  # (just_audio has no bundled Windows impl, so the desktop dev build still
  # links — the chime is a mobile feature and no-ops on Windows.)
  just_audio: ^0.9.40
  # Pure-Dart PDF generation for the "export as PDF" option (no native deps, so
  # it never touches the Windows/iOS build the way an audio/print plugin would).
  pdf: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Drives the app on a real emulator/simulator to capture store screenshots
  # (and, as a side effect, smoke-tests the native plugins on a real device).
  integration_test:
    sdk: flutter

  # drift code generation.
  drift_dev: ^2.16.0
  build_runner: ^2.4.9

  flutter_lints: ^4.0.0
  flutter_launcher_icons: 0.14.1

  # Used only by test/migration_v4_to_v6_test.dart to build a raw v4-schema
  # database file (predating drift's current schema) and drive the real
  # upgrade path. Already a transitive dependency of drift.
  sqlite3: ^3.0.0

# Generates the native Android/iOS launcher icons from the artwork in assets/.
# Regenerate with: dart run flutter_launcher_icons
#
# The coin already sits at ~65% of the source square, which is the size an
# Android adaptive foreground wants, so the artwork is passed through as-is --
# the tool insets it 16% for the launcher's safe zone. Pre-padding it here too
# would compound the two and leave the coin tiny. The adaptive background is the
# artwork's own #1C1C20, so its backdrop blends into the mask seamlessly.
# iOS gets the flat, alpha-free 1024 square Apple requires.
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  adaptive_icon_background: "#1C1C20"
  adaptive_icon_foreground: "assets/icon/icon.png"
  ios: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    # Short confirmation chimes: in_short on income, out_short on expense.
    - assets/sound_effects/in_short.m4a
    - assets/sound_effects/out_short.m4a
  # Bundled so the app fetches nothing at runtime (the privacy promise). Both
  # families are SIL OFL 1.1; license text ships alongside in assets/fonts/.
  fonts:
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
